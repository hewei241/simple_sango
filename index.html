<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三国地形图</title>
  <link rel="stylesheet" href="css/map.css?v=elev3">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>三国地形图</h1>
      <p class="subtitle">数据来自根目录 china-terrain-data.edit.js · 拖动/滚轮浏览 · 开编辑模式后可涂色保存</p>
      <p id="paintLog" class="paint-log">准备就绪</p>
    </header>

    <div class="toolbar">
      <div class="view-toggle">
        <button type="button" id="btnViewGrid" class="view-btn active">方格地形</button>
        <button type="button" id="btnViewJpg" class="view-btn">原图对照</button>
      </div>
      <div class="edit-tools">
        <button type="button" id="btnEditMode" class="view-btn">编辑模式</button>
        <button type="button" id="btnSaveMap" class="view-btn hidden" disabled>保存</button>
        <button type="button" id="btnResetOriginal" class="view-btn hidden">恢复原始</button>
        <span id="editStatus" class="edit-status">浏览中</span>
      </div>
      <div class="legend legend-terrain" id="terrainPalette">
        <span class="legend-title" id="terrainLegendTitle">地形图例</span>
        <button type="button" class="legend-item" data-terrain="plain">平原</button>
        <button type="button" class="legend-item" data-terrain="hill">丘陵</button>
        <button type="button" class="legend-item" data-terrain="highhill">高丘</button>
        <button type="button" class="legend-item" data-terrain="mountain">山地</button>
        <button type="button" class="legend-item" data-terrain="alpine">高山</button>
        <button type="button" class="legend-item" data-terrain="river">河流</button>
        <button type="button" class="legend-item" data-terrain="sea">海域</button>
        <button type="button" class="legend-item" data-terrain="coast">海岸</button>
        <button type="button" class="legend-item" data-terrain="desert">沙漠</button>
      </div>
    </div>

    <div class="map-wrapper" id="mapWrapper">
      <canvas id="mapCanvas"></canvas>
      <div id="tooltip" class="tooltip hidden"></div>
    </div>

    <aside id="infoPanel" class="info-panel">
      <h2>地块信息</h2>
      <p class="hint">点击格子查看地形 · 左键拖动平移</p>
    </aside>
  </div>

  <script src="js/china-terrain-data.original.js?v=elev3"></script>
  <script src="china-terrain-data.edit.js?v=elev3"></script>
  <script src="js/jpg-source-config.js?v=elev3"></script>
  <script src="js/map-data.js?v=elev3"></script>
  <script src="js/map-renderer.js?v=elev3"></script>
  <script src="js/main.js?v=elev3"></script>
</body>
</html>
